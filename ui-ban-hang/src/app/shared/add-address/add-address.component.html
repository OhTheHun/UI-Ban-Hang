<div class="address-modal" *ngIf="isOpen" (click)="onClose()">
  <div class="address-modal__content" (click)="$event.stopPropagation()">
    <div class="address-modal__header">
      <h2>Nhập địa chỉ giao hàng</h2>
      <button class="address-modal__close" (click)="onClose()">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
    <form class="address-modal__form" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="province">Tỉnh/Thành phố</label>
        <select id="province" class="form-input" [(ngModel)]="province" name="province" required>
          <option value="">Chọn Tỉnh/Thành phố</option>
        </select>
      </div>
      <div class="form-group">
        <label for="district">Quận/Huyện</label>
        <select id="district" class="form-input" [(ngModel)]="district" name="district" required>
          <option value="">Chọn Quận/Huyện</option>
        </select>
      </div>
      <div class="form-group">
        <label for="ward">Phường/Xã</label>
        <select id="ward" class="form-input" [(ngModel)]="ward" name="ward" required>
          <option value="">Chọn Phường/Xã</option>
        </select>
      </div>
      <div class="form-group">
        <label for="address">Địa chỉ chi tiết</label>
        <input 
          type="text" 
          id="address" 
          class="form-input" 
          [(ngModel)]="address" 
          name="address"
          placeholder="Số nhà, đường..." 
          required
        />
      </div>
      <button type="submit" class="address-modal__submit">Xác nhận</button>
    </form>
  </div>
</div>
