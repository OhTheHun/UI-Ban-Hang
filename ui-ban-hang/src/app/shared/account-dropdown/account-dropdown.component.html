<div class="account-dropdown-container">
  <button class="account-trigger" [class.logged-in]="isLoggedIn" (click)="toggleDropdown()" aria-label="Tài khoản">
    <div class="account-display">
      <ng-container *ngIf="isLoggedIn; else guestIcon">
        <img [src]="currentUser?.avatar" [alt]="currentUser?.name" class="avatar"
          onerror="this.onerror=null;this.src='/logo/account.webp'">
      </ng-container>
      <ng-template #guestIcon>
        <img src="/logo/account.webp" alt="Tài khoản" class="account-icon-img" />
      </ng-template>
      <span class="account-label">Tài khoản</span>
    </div>
  </button>

  <div class="dropdown-menu" [class.show]="isOpen">

    <!-- Logged In State -->
    <div class="dropdown-content" *ngIf="isLoggedIn; else guestContent">
      <div class="user-header">
        <img [src]="currentUser?.avatar" [alt]="currentUser?.name" class="user-avatar"
          onerror="this.onerror=null;this.src='/logo/account.webp'">
        <div class="user-info">
          <h4 class="user-name">{{ currentUser?.name }}</h4>
          <p class="user-email">{{ currentUser?.email }}</p>
        </div>
      </div>

      <div class="menu-divider"></div>

      <a href="/profile" class="dropdown-item" (click)="onProfile()">
        <svg class="item-icon" width="18" height="18" viewBox="0 0 24 24" fill="none">
          <path
            d="M20 21V19C20 17.9391 19.5786 16.9217 18.8284 16.1716C18.0783 15.4214 17.0609 15 16 15H8C6.93913 15 5.92172 15.4214 5.17157 16.1716C4.42143 16.9217 4 17.9391 4 19V21M16 7C16 9.20914 14.2091 11 12 11C9.79086 11 8 9.20914 8 7C8 4.79086 9.79086 3 12 3C14.2091 3 16 4.79086 16 7Z"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
        <span>Hồ sơ cá nhân</span>
      </a>

      <a href="/orders" class="dropdown-item">
        <svg class="item-icon" width="18" height="18" viewBox="0 0 24 24" fill="none">
          <path
            d="M9 5H7C5.89543 5 5 5.89543 5 7V19C5 20.1046 5.89543 21 7 21H17C18.1046 21 19 20.1046 19 19V7C19 5.89543 18.1046 5 17 5H15M9 5C9 6.10457 9.89543 7 11 7H13C14.1046 7 15 6.1046 15 5M9 5C9 3.89543 9.89543 3 11 3H13C14.1046 3 15 3.89543 15 5"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
        <span>Đơn hàng của tôi</span>
      </a>

      <a href="/wishlist" class="dropdown-item">
        <svg class="item-icon" width="18" height="18" viewBox="0 0 24 24" fill="none">
          <path
            d="M20.84 4.61C20.3292 4.09902 19.7228 3.69364 19.0554 3.41708C18.3879 3.14052 17.6725 2.99817 16.95 2.99817C16.2275 2.99817 15.5121 3.14052 14.8446 3.41708C14.1772 3.69364 13.5708 4.09902 13.06 4.61L12 5.67L10.94 4.61C9.9083 3.5783 8.50903 2.9987 7.05 2.9987C5.59097 2.9987 4.19169 3.5783 3.16 4.61C2.1283 5.64169 1.54871 7.04097 1.54871 8.5C1.54871 9.95903 2.1283 11.3583 3.16 12.39L4.22 13.45L12 21.23L19.78 13.45L20.84 12.39C21.351 11.8792 21.7564 11.2728 22.0329 10.6054C22.3095 9.9379 22.4518 9.22249 22.4518 8.5C22.4518 7.77751 22.3095 7.0621 22.0329 6.39464C21.7564 5.72718 21.351 5.12082 20.84 4.61Z"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
        <span>Danh sách yêu thích</span>
      </a>

      <div class="menu-divider"></div>

      <button class="dropdown-item logout-btn" (click)="onLogout()">
        <svg class="item-icon" width="18" height="18" viewBox="0 0 24 24" fill="none">
          <path
            d="M9 21H5C4.46957 21 3.96086 20.7893 3.58579 20.4142C3.21071 20.0391 3 19.5304 3 19V5C3 4.46957 3.21071 3.96086 3.58579 3.58579C3.96086 3.21071 4.46957 3 5 3H9M16 17L21 12M21 12L16 7M21 12H9"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
        <span>Đăng xuất</span>
      </button>
    </div>

    <!-- Guest State -->
    <ng-template #guestContent>
      <div class="dropdown-content">
        <div class="guest-header">
          <svg class="guest-icon" width="48" height="48" viewBox="0 0 24 24" fill="none">
            <path
              d="M20 21V19C20 17.9391 19.5786 16.9217 18.8284 16.1716C18.0783 15.4214 17.0609 15 16 15H8C6.93913 15 5.92172 15.4214 5.17157 16.1716C4.42143 16.9217 4 17.9391 4 19V21M16 7C16 9.20914 14.2091 11 12 11C9.79086 11 8 9.20914 8 7C8 4.79086 9.79086 3 12 3C14.2091 3 16 4.79086 16 7Z"
              stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
          </svg>
          <h3 class="guest-title">Chào mừng bạn!</h3>
          <p class="guest-subtitle">Đăng nhập để trải nghiệm tốt hơn</p>
        </div>

        <div class="menu-divider"></div>

        <a class="dropdown-item login-btn" routerLink="/login" (click)="closeDropdown()">
          <svg class="item-icon" width="18" height="18" viewBox="0 0 24 24" fill="none">
            <path
              d="M11 16L7 12M7 12L11 8M7 12H21M16 16V18C16 18.5304 15.7893 19.0391 15.4142 19.4142C15.0391 19.7893 14.5304 20 14 20H6C5.46957 20 4.96086 19.7893 4.58579 19.4142C4.21071 19.0391 4 18.5304 4 18V6C4 5.46957 4.21071 3.96086 4.58579 3.58579C4.96086 3.21071 5.46957 3 6 3H14C14.5304 3 15.0391 3.21071 15.4142 3.58579C15.7893 3.96086 16 4.46957 16 6V8"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
          </svg>
          <span>Đăng nhập</span>
        </a>

        <a class="dropdown-item signup-btn" routerLink="/register" (click)="closeDropdown()">
          <svg class="item-icon" width="18" height="18" viewBox="0 0 24 24" fill="none">
            <path
              d="M18 9V12M18 12V15M18 12H21M18 12H15M13 7C13 8.10457 12.1046 9 11 9C9.89543 9 9 8.10457 9 7C9 5.89543 9.89543 5 11 5C12.1046 5 13 5.89543 13 7ZM7 20C7 17.7909 8.79086 16 11 16C13.2091 16 15 17.7909 15 20"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
          </svg>
          <span>Đăng ký</span>
        </a>
      </div>
    </ng-template>
  </div>
</div>
