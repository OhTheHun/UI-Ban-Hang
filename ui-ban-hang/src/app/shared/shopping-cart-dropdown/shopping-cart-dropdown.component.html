<div class="shopping-cart-dropdown-container">
  <button class="cart-trigger" (click)="toggleDropdown()" aria-label="Giỏ hàng">
    <img src="/logo/shopping-cart.png" alt="Giỏ hàng" class="cart-icon" />
    <span class="cart-label">Giỏ hàng</span>
    <span class="cart-count" *ngIf="totalItems > 0">{{ totalItems }}</span>
  </button>

  <div class="dropdown-menu" [class.show]="isOpen">

    <!-- Cart Items -->
    <div class="cart-items" *ngIf="cartItems.length > 0; else emptyCart">
      <div class="cart-item" *ngFor="let item of cartItems" (click)="onCartItemClick(item)">
        <img [src]="item.image" [alt]="item.name" class="item-image" />
        <div class="item-details">
          <h4 class="item-name">{{ item.name }}</h4>
          <div class="item-price">
            <span class="price">{{ item.price | number:'1.0-0':'vi-VN' }}₫</span>
            <span class="quantity">x{{ item.quantity }}</span>
          </div>
        </div>
        <button class="remove-btn" (click)="onRemoveItem(item); $event.stopPropagation()">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none">
            <path d="M18 6L6 18M6 6L18 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"
              stroke-linejoin="round" />
          </svg>
        </button>
      </div>
    </div>

    <!-- Empty Cart -->
    <ng-template #emptyCart>
      <div class="empty-cart">
        <svg class="empty-icon" width="48" height="48" viewBox="0 0 24 24" fill="none">
          <path
            d="M9 5H7C5.89543 5 5 5.89543 5 7V19C5 20.1046 5.89543 21 7 21H17C18.1046 21 19 20.1046 19 19V7C19 5.89543 18.1046 5 17 5H15M9 5C9 6.10457 9.89543 7 11 7H13C14.1046 7 15 6.1046 15 5M9 5C9 3.89543 9.89543 3 11 3H13C14.1046 3 15 3.89543 15 5"
            stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
        <p class="empty-text">Giỏ hàng trống</p>
      </div>
    </ng-template>

    <!-- Cart Footer -->
    <div class="cart-footer" *ngIf="cartItems.length > 0">
      <div class="cart-total">
        <span class="total-label">Tổng cộng:</span>
        <span class="total-price">{{ totalPrice | number:'1.0-0':'vi-VN' }}₫</span>
      </div>
      <button class="view-cart-btn" (click)="onViewCart()">
        Xem giỏ hàng
      </button>
    </div>
  </div>
</div>
