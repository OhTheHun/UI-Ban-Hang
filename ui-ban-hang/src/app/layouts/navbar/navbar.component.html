<header class="w-full font-sans shadow-sm">
  <!--  Navigation Bar -->
  <div class="bg-gradient-to-r from-orange-500 to-amber-500 text-white py-3 px-6 shadow-md relative z-20">
    <div class="max-w-7xl mx-auto flex items-center justify-between gap-6">

      <!--  Brand  -->
      <a href="#" class="text-3xl font-extrabold tracking-wider hover:opacity-90 transition-opacity whitespace-nowrap">
        MABIXI
      </a>

      <!--  Search Bar -->
      <div class="flex-1 max-w-xl mx-auto relative">
        <div class="relative flex items-center w-full h-11 rounded-full overflow-hidden bg-white shadow-inner">
          <input type="text" placeholder="Tìm kiếm sản phẩm, thương hiệu..."
            class="w-full h-full pl-5 pr-12 text-gray-800 outline-none border-none placeholder-gray-400 focus:ring-0 text-sm">
          <button
            class="absolute right-0 h-full px-4 text-orange-500 hover:bg-orange-50 transition-colors flex items-center justify-center">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 font-bold" fill="none" viewBox="0 0 24 24"
              stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
                d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
            </svg>
          </button>
        </div>
      </div>

      <!-- Action Icons ( -->
      <div class="flex items-center space-x-6">
        <button class="flex flex-col items-center group">
          <div
            class="w-10 h-10 rounded-full bg-white flex items-center justify-center shadow-lg overflow-hidden border-2 border-white/20 group-hover:scale-105 transition-transform duration-300">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-orange-500" fill="none" viewBox="0 0 24 24"
              stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" />
            </svg>
          </div>
          <span class="text-[11px] font-semibold mt-1 uppercase tracking-wide">Yêu thích</span>
        </button>

        <button class="flex flex-col items-center group">
          <div
            class="w-10 h-10 rounded-full bg-white flex items-center justify-center shadow-lg overflow-hidden border-2 border-white/20 group-hover:scale-105 transition-transform duration-300">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-orange-500" fill="none" viewBox="0 0 24 24"
              stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
            </svg>
          </div>
          <span class="text-[11px] font-semibold mt-1 uppercase tracking-wide">Tài khoản</span>
        </button>

        <button class="flex flex-col items-center group relative">
          <div
            class="w-10 h-10 rounded-full bg-white flex items-center justify-center shadow-lg overflow-hidden border-2 border-white/20 group-hover:scale-105 transition-transform duration-300">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-orange-500" fill="none" viewBox="0 0 24 24"
              stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z" />
            </svg>
          </div>
          <!-- Badge -->
          <span
            class="absolute top-0 right-0 -mt-1 -mr-1 bg-red-600 text-white text-[10px] font-bold px-1.5 py-0.5 rounded-full border border-orange-500 shadow-sm">
            0
          </span>
          <span class="text-[11px] font-semibold mt-1 uppercase tracking-wide">Giỏ hàng</span>
        </button>
      </div>

    </div>
  </div>

  <!--  Filter and Links  -->
  <div class="bg-white border-b border-gray-200 relative z-10 w-full shadow-sm">
    <div class="max-w-7xl mx-auto flex items-center px-6 h-12">

      <div class="flex items-center gap-6 h-full">

        <!-- Toggle Danh mục -->
        <div class="relative h-full flex items-center">
          <button (click)="toggleFilter()"
            class="flex items-center gap-2 h-full text-gray-800 font-bold hover:text-orange-500 transition-colors focus:outline-none">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
              stroke="currentColor">
              <!-- Menu layout styling -->
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
            </svg>
            DANH MỤC SẢN PHẨM
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 transition-transform duration-200"
              [class.rotate-180]="isFilterOpen" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
            </svg>
          </button>

          <!-- Dropdown Filter Box -->
          <div *ngIf="isFilterOpen"
            class="absolute top-full left-0 mt-0 w-64 bg-white border border-gray-100 shadow-2xl rounded-b-lg z-50 overflow-hidden">
            <ul class="py-2 text-sm text-gray-700 font-medium font-sans">
              <li><a href="#"
                  class="block px-5 py-2.5 hover:bg-orange-50 hover:text-orange-600 transition-colors border-b border-gray-50 last:border-0">👗
                  Thời trang</a></li>
              <li><a href="#"
                  class="block px-5 py-2.5 hover:bg-orange-50 hover:text-orange-600 transition-colors border-b border-gray-50 last:border-0">📱
                  Điện thoại & Phụ kiện</a></li>
              <li><a href="#"
                  class="block px-5 py-2.5 hover:bg-orange-50 hover:text-orange-600 transition-colors border-b border-gray-50 last:border-0">💻
                  Máy tính & Laptop</a></li>
              <li><a href="#"
                  class="block px-5 py-2.5 hover:bg-orange-50 hover:text-orange-600 transition-colors border-b border-gray-50 last:border-0">🏠
                  Nhà cửa & Đời sống</a></li>
              <li><a href="#"
                  class="block px-5 py-2.5 hover:bg-orange-50 hover:text-orange-600 transition-colors border-b border-gray-50 last:border-0">💄
                  Sức khỏe & Sắc đẹp</a></li>
            </ul>
          </div>
        </div>

        <div class="h-5 border-l border-gray-300"></div>

        <!-- Links -->
        <a href="#"
          class="text-sm font-semibold text-gray-700 hover:text-orange-600 transition-colors px-2 py-1 rounded-md hover:bg-orange-50">
          🔥 Khuyến mãi chỉ có tại MABIXi
        </a>

        <a href="#"
          class="text-sm font-semibold text-gray-700 hover:text-orange-600 transition-colors px-2 py-1 rounded-md hover:bg-orange-50">
          📰 Tin tức
        </a>
      </div>
    </div>
  </div>
</header>
